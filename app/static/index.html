<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>B站视频内容检索</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div>
          <h1>B站视频内容检索</h1>
          <p>批量导入公开视频字幕，按关键词跳到具体时间点。</p>
        </div>
        <button id="refreshVideos" class="icon-button" title="刷新视频库">↻</button>
      </header>

      <section class="panel import-panel">
        <div class="section-head">
          <h2>导入</h2>
          <span id="jobBadge" class="badge">等待任务</span>
        </div>
        <textarea id="importText" placeholder="每行一个 B站链接或 BV号&#10;https://www.bilibili.com/video/BV...&#10;BV..."></textarea>
        <div class="actions">
          <button id="startImport" class="primary">开始导入</button>
          <span id="importHint"></span>
        </div>
        <div id="jobLog" class="job-log"></div>
      </section>

      <section class="panel search-panel">
        <div class="section-head">
          <h2>搜索</h2>
          <span id="searchCount" class="badge">0 条结果</span>
        </div>
        <form id="searchForm" class="search-form">
          <input id="searchInput" autocomplete="off" placeholder="输入字幕关键词，例如：机器学习" />
          <button class="primary" type="submit">搜索</button>
        </form>
        <div id="searchResults" class="results empty">输入关键词后开始搜索。</div>
      </section>

      <section class="panel library-panel">
        <div class="section-head">
          <h2>视频库</h2>
          <span id="videoCount" class="badge">0 个视频</span>
        </div>
        <div class="toolbar">
          <label class="select-label">
            转写后端
            <select id="asrBackend">
              <option value="local">本地 Whisper</option>
              <option value="openai">OpenAI whisper-1</option>
            </select>
          </label>
          <button id="selectAllMissing" class="small-button">选择当前页无字幕</button>
          <button id="clearSelection" class="small-button">清空选择</button>
          <button id="transcribeMissing" class="primary" disabled>转写选中视频</button>
        </div>
        <div class="openai-configs">
          <section class="config-box">
            <div class="config-title">
              <strong>总结模型配置</strong>
              <span id="summaryOpenAIStatus">未配置</span>
            </div>
            <div class="config-grid">
              <label>
                API Key
                <input id="summaryOpenAIKey" type="password" autocomplete="off" placeholder="sk-..." />
              </label>
              <label>
                Base URL
                <input id="summaryOpenAIBaseUrl" autocomplete="off" placeholder="https://api.example.com/v1" />
              </label>
              <label>
                模型名
                <input id="summaryOpenAIModel" autocomplete="off" placeholder="gpt-5.4-mini" />
              </label>
            </div>
            <div class="config-actions">
              <button id="saveSummaryOpenAI" class="small-button">保存总结配置</button>
              <button id="clearSummaryOpenAI" class="small-button">清空总结配置</button>
            </div>
          </section>
          <section class="config-box">
            <div class="config-title">
              <strong>转写模型配置</strong>
              <span id="transcribeOpenAIStatus">未配置</span>
            </div>
            <div class="config-grid">
              <label>
                API Key
                <input id="transcribeOpenAIKey" type="password" autocomplete="off" placeholder="sk-..." />
              </label>
              <label>
                Base URL
                <input id="transcribeOpenAIBaseUrl" autocomplete="off" placeholder="https://api.example.com/v1" />
              </label>
              <label>
                模型名
                <input id="transcribeOpenAIModel" autocomplete="off" placeholder="whisper-1" />
              </label>
            </div>
            <div class="config-actions">
              <button id="saveTranscribeOpenAI" class="small-button">保存转写配置</button>
              <button id="clearTranscribeOpenAI" class="small-button">清空转写配置</button>
            </div>
          </section>
        </div>
        <div id="openaiKeyStatus" class="asr-status">正在读取 OpenAI Key 配置...</div>
        <div id="asrStatus" class="asr-status">正在检测转写依赖...</div>
        <div class="library-groups">
          <section class="library-group">
            <div class="group-head">
              <div>
                <h3>可查看内容</h3>
                <p>已有字幕或转写稿的视频。</p>
              </div>
              <span id="availableVideoCount" class="badge">0 个视频</span>
            </div>
            <div id="availableVideoList" class="video-list empty">还没有可查看内容。</div>
            <div id="availablePager" class="pager"></div>
          </section>
          <section class="library-group">
            <div class="group-head">
              <div>
                <h3>暂无内容 / 待转写</h3>
                <p>还没有本地字幕分段的视频，可选择后批量转写。</p>
              </div>
              <span id="unavailableVideoCount" class="badge">0 个视频</span>
            </div>
            <div id="unavailableVideoList" class="video-list empty">还没有暂无内容的视频。</div>
            <div id="unavailablePager" class="pager"></div>
          </section>
        </div>
      </section>
    </main>
    <div id="contentModal" class="modal hidden" aria-hidden="true">
      <div class="modal-backdrop" data-close-content></div>
      <section class="content-panel" role="dialog" aria-modal="true" aria-labelledby="contentTitle">
        <div class="content-head">
          <div>
            <h2 id="contentTitle">视频内容</h2>
            <div id="contentMeta" class="meta">正在加载...</div>
          </div>
          <button id="closeContent" class="icon-button" title="关闭">×</button>
        </div>
        <div id="contentBody" class="content-body empty">正在加载内容...</div>
      </section>
    </div>
    <script src="/static/app.js"></script>
  </body>
</html>
